<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/output.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <title>Blog | Sabriel Adriel</title>
  </head>

  <body
    class="text-white relative font-poppins flex flex-col min-h-screen"
    style="background-color: #0a0a0a; overflow-x: hidden"
  >
    <!-- Dark Horizon Glow -->
    <div
      class="fixed inset-0 z-10 pointer-events-none"
      style="
        background: radial-gradient(
          125% 125% at 50% 10%,
          #00000000 40%,
          #0d1a36 100%
        );
      "
    ></div>

    <!-- Dark White Dotted Grid Background -->
    <div
      class="fixed inset-0 z-5 pointer-events-none"
      style="
        background: #000000;
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 1.5px,
          transparent 1.5px
        );
        background-size: 30px 30px;
        background-position: 0 0;
      "
    ></div>

    <!-- Content Wrapper -->
    <div class="relative z-10 flex-1 w-full">
      <!-- Navbar Container -->
      <div id="navbar-container"></div>

      <!-- React App Root -->
      <div id="root"></div>

      <!-- Footer Container -->
      <div id="footer-container"></div>
    </div>

    <script src="./assets/react-components-DAK_MM9F.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/router.js"></script>
  </body>
</html>
