<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/output.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <title>Contact | Sabriel Adriel</title>
  </head>

  <body
    class="text-white relative font-poppins flex flex-col min-h-screen"
    style="background-color: #0a0a0a; overflow-x: hidden"
  >
    <!-- Dark Horizon Glow -->
    <div
      class="fixed inset-0 z-10 pointer-events-none"
      style="
        background: radial-gradient(
          125% 125% at 50% 10%,
          #00000000 40%,
          #0d1a36 100%
        );
      "
    ></div>

    <!-- Dark White Dotted Grid Background -->
    <div
      class="fixed inset-0 z-5 pointer-events-none"
      style="
        background: #000000;
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 1.5px,
          transparent 1.5px
        );
        background-size: 30px 30px;
        background-position: 0 0;
      "
    ></div>

    <!-- Content Wrapper -->
    <div class="relative z-10 flex-1 w-full">
      <!-- Navbar Container -->
      <div id="navbar-container"></div>

      <!-- Hero Section -->
      <section
        id="hero"
        class="flex items-center justify-center px-6 sm:px-6 md:px-8 pt-36 md:pt-44 pb-32 md:pb-40"
        style="min-height: auto"
      >
        <div class="max-w-6xl w-full">
          <!-- Contact Header -->
          <div class="flex flex-col items-center text-center mb-16">
            <h1
              class="font-bold mb-4"
              style="font-size: clamp(32px, 6vw, 52px)"
            >
              Get in Touch
            </h1>
            <p
              class="text-gray-400 text-base sm:text-lg max-w-2xl leading-relaxed"
            >
              Have a project in mind or just want to chat? I'd love to hear from
              you. Feel free to reach out anytime.
            </p>
          </div>

          <!-- Contact Content Grid -->
          <div
            class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-10 items-start"
          >
            <!-- Left Column - Contact Info -->
            <div class="md:col-span-1 flex flex-col gap-6">
              <!-- Email -->
              <div
                class="p-6 sm:p-7 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 hover:border-blue-500/30 transition-all duration-300 backdrop-blur-lg shadow-lg"
              >
                <div class="flex items-center gap-4 mb-3">
                  <div
                    class="w-10 h-10 rounded-xl bg-blue-500/60 flex items-center justify-center shrink-0"
                  >
                    <img
                      src="./assets/icons/email.svg"
                      alt="Email"
                      width="18"
                      height="18"
                    />
                  </div>
                  <h3 class="font-semibold text-white text-sm sm:text-base">
                    Email
                  </h3>
                </div>
                <a
                  href="mailto:savvv.business@gmail.com"
                  class="text-gray-300 hover:text-blue-400 transition break-all text-sm font-medium"
                >
                  savvv.business@gmail.com
                </a>
              </div>

              <!-- Location -->
              <div
                class="p-6 sm:p-7 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 hover:border-yellow-500/30 transition-all duration-300 backdrop-blur-lg shadow-lg"
              >
                <div class="flex items-center gap-4 mb-3">
                  <div
                    class="w-10 h-10 rounded-xl bg-yellow-500/60 flex items-center justify-center shrink-0"
                  >
                    <img
                      src="./assets/icons/location.svg"
                      alt="Location"
                      width="20"
                      height="20"
                    />
                  </div>
                  <h3 class="font-semibold text-white text-sm sm:text-base">
                    Location
                  </h3>
                </div>
                <p class="text-gray-300 text-sm font-medium">
                  Philippines • Remote
                </p>
              </div>

              <!-- Availability -->
              <div
                class="p-6 sm:p-7 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 hover:border-green-500/30 transition-all duration-300 backdrop-blur-lg shadow-lg"
              >
                <div class="flex items-center gap-4 mb-3">
                  <div
                    class="w-10 h-10 rounded-xl bg-green-500/60 flex items-center justify-center shrink-0"
                  >
                    <img
                      src="./assets/icons/availability.svg"
                      alt="Availability"
                      width="18"
                      height="18"
                    />
                  </div>
                  <h3 class="font-semibold text-white text-sm sm:text-base">
                    Availability
                  </h3>
                </div>
                <p class="text-gray-300 text-sm font-medium">
                  Available for freelance projects
                </p>
              </div>
            </div>

            <!-- Right Column - Contact Form -->
            <div class="md:col-span-2">
              <div
                class="p-8 sm:p-10 rounded-2xl border border-white/10 bg-white/5 backdrop-blur-lg shadow-lg"
              >
                <form id="contact-form" class="flex flex-col gap-5">
                  <!-- Name Field -->
                  <div class="flex flex-col gap-2.5">
                    <label
                      for="name"
                      class="text-sm font-semibold text-white/90"
                    >
                      Your Name <span class="text-red-400">*</span>
                    </label>
                    <input
                      type="text"
                      id="name"
                      name="name"
                      required
                      placeholder="John Doe"
                      class="px-4 py-3 rounded-lg border border-white/15 bg-white/8 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500/50 focus:bg-white/15 transition-all duration-200 backdrop-blur-sm"
                    />
                  </div>

                  <!-- Email Field -->
                  <div class="flex flex-col gap-2.5">
                    <label
                      for="email"
                      class="text-sm font-semibold text-white/90"
                    >
                      Your Email <span class="text-red-400">*</span>
                    </label>
                    <input
                      type="email"
                      id="email"
                      name="email"
                      required
                      placeholder="john@example.com"
                      class="px-4 py-3 rounded-lg border border-white/15 bg-white/8 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500/50 focus:bg-white/15 transition-all duration-200 backdrop-blur-sm"
                    />
                  </div>

                  <!-- Subject Field -->
                  <div class="flex flex-col gap-2.5">
                    <label
                      for="subject"
                      class="text-sm font-semibold text-white/90"
                    >
                      Subject <span class="text-red-400">*</span>
                    </label>
                    <input
                      type="text"
                      id="subject"
                      name="subject"
                      required
                      placeholder="Project Inquiry"
                      class="px-4 py-3 rounded-lg border border-white/15 bg-white/8 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500/50 focus:bg-white/15 transition-all duration-200 backdrop-blur-sm"
                    />
                  </div>

                  <!-- Message Field -->
                  <div class="flex flex-col gap-2.5">
                    <label
                      for="message"
                      class="text-sm font-semibold text-white/90"
                    >
                      Message <span class="text-red-400">*</span>
                    </label>
                    <textarea
                      id="message"
                      name="message"
                      required
                      rows="6"
                      placeholder="Tell me about your project or interest..."
                      class="px-4 py-3 rounded-lg border border-white/15 bg-white/8 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500/50 focus:bg-white/15 transition-all duration-200 backdrop-blur-sm resize-none"
                    ></textarea>
                  </div>

                  <!-- Submit Button -->
                  <button
                    type="submit"
                    class="w-full px-6 py-3 mt-2 rounded-lg font-semibold bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white transition-all duration-200 shadow-lg hover:shadow-blue-500/20"
                  >
                    Send Message
                  </button>

                  <!-- Form Status Message -->
                  <div
                    id="form-status"
                    class="text-center text-sm hidden"
                  ></div>
                </form>
              </div>

              <!-- Social Links -->
              <div class="mt-8 pt-8 border-t border-white/10">
                <p class="text-sm text-gray-400 mb-4 font-medium">
                  Or connect on social media:
                </p>
                <div class="flex gap-3 flex-wrap">
                  <a
                    href="https://www.linkedin.com/in/sabrieladriel/"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="px-4 py-2.5 rounded-lg border border-white/15 bg-white/8 hover:bg-white/15 hover:border-blue-500/30 transition-all duration-200 text-sm font-medium backdrop-blur-sm"
                  >
                    LinkedIn
                  </a>
                  <a
                    href="https://www.instagram.com/s4burieru_/"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="px-4 py-2.5 rounded-lg border border-white/15 bg-white/8 hover:bg-white/15 hover:border-blue-500/30 transition-all duration-200 text-sm font-medium backdrop-blur-sm"
                  >
                    Instagram
                  </a>
                  <a
                    href="https://www.facebook.com/sabrieladriel/"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="px-4 py-2.5 rounded-lg border border-white/15 bg-white/8 hover:bg-white/15 hover:border-blue-500/30 transition-all duration-200 text-sm font-medium backdrop-blur-sm"
                  >
                    Facebook
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Footer Container -->
      <div id="footer-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="./assets/react-components-DAK_MM9F.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/contact.js"></script>
    <script src="./js/services.js"></script>
    <script src="./js/animations.js"></script>
    <script src="./js/router.js"></script>
  </body>
</html>
