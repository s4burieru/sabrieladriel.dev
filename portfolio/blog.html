<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/output.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <title>Blog | Sabriel Adriel</title>
  </head>

  <body
    class="text-white relative"
    style="background-color: #0a0a0a; min-height: 100vh; overflow-x: hidden"
  >
    <!-- Dark Horizon Glow -->
    <div
      class="fixed inset-0 z-10 pointer-events-none"
      style="
        background: radial-gradient(
          125% 125% at 50% 10%,
          #00000000 40%,
          #0d1a36 100%
        );
      "
    ></div>

    <!-- Dark White Dotted Grid Background -->
    <div
      class="fixed inset-0 z-5 pointer-events-none"
      style="
        background: #000000;
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 1.5px,
          transparent 1.5px
        );
        background-size: 30px 30px;
        background-position: 0 0;
      "
    ></div>

    <!-- Content Wrapper -->
    <div class="relative z-10">
      <!-- Navbar Container -->
      <div id="navbar-container"></div>

      <!-- Hero Section for Blog -->
      <section
        id="hero"
        class="flex items-center justify-center px-6 sm:px-6 md:px-8 pt-28 md:pt-24 pb-4 md:pb-8"
        style="min-height: 50vh"
      >
        <div class="flex flex-col items-center max-w-6xl">
          <h1
            class="text-4xl sm:text-5xl md:text-6xl font-bold mb-4 text-center"
          >
            Blog
          </h1>
          <p
            class="text-base sm:text-lg md:text-xl text-gray-400 text-center max-w-2xl"
          >
            Thoughts, experiences, and insights on technology, personal growth,
            and lessons learned from exploring.
          </p>
        </div>
      </section>

      <!-- Individual Blog Post Section -->
      <section
        id="single-blog-post"
        class="pt-40 md:pt-48 pb-16 md:pb-24 flex justify-center"
        style="display: none"
      >
        <div
          class="flex flex-col items-start w-full max-w-4xl px-6 sm:px-6 md:px-8"
        >
          <!-- Back to All Posts Link -->
          <a
            href="blog.html"
            id="back-to-posts-link"
            class="text-blue-500 hover:text-blue-400 transition mb-8 flex items-center gap-2"
            style="display: none"
          >
            <span>←</span> Back to All Posts
          </a>

          <!-- Post Content Container -->
          <article id="single-blog-post-container" class="w-full">
            <!-- Post content will be loaded here by JavaScript -->
          </article>
        </div>
      </section>

      <!-- All Blog Posts Section -->
      <section
        id="all-blog-posts"
        class="pb-16 md:pb-24 px-6 sm:px-6 md:px-8 flex justify-center"
      >
        <div class="flex flex-col items-start w-full max-w-6xl">
          <!-- Blog Posts Grid -->
          <div
            class="w-full grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8"
            id="all-blog-posts-container"
          >
            <!-- All blog posts will be loaded here by JavaScript -->
          </div>
        </div>
      </section>

      <!-- Footer Container -->
      <div id="footer-container"></div>
    </div>

    <script src="./js/main.js"></script>
    <script src="./js/blog.js"></script>
    <script src="./js/animations.js"></script>
  </body>
</html>
