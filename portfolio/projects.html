<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/output.css" />
    <title>Projects | Sabriel Adriel</title>
    <style>
      /* Style for select dropdown */
      #sort-dropdown {
        appearance: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 0.75rem center;
        background-size: 1.5rem;
        padding-right: 2.5rem;
      }

      /* Style for options */
      #sort-dropdown option {
        background-color: #1a1a1a;
        color: #ffffff;
        padding: 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      #sort-dropdown option:hover {
        background-color: #2a2a2a;
      }

      #sort-dropdown option:checked {
        background-color: #3a3a3a;
        color: #ffffff;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  </head>

  <body
    class="text-white relative"
    style="background-color: #0a0a0a; min-height: 100vh; overflow-x: hidden"
  >
    <!-- Dark Horizon Glow -->
    <div
      class="fixed inset-0 z-10 pointer-events-none"
      style="
        background: radial-gradient(
          125% 125% at 50% 10%,
          #00000000 40%,
          #0d1a36 100%
        );
      "
    ></div>

    <!-- Dark White Dotted Grid Background -->
    <div
      class="fixed inset-0 z-5 pointer-events-none"
      style="
        background: #000000;
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 1.5px,
          transparent 1.5px
        );
        background-size: 30px 30px;
        background-position: 0 0;
      "
    ></div>

    <!-- Content Wrapper -->
    <div class="relative z-10">
      <!-- Navbar Container -->
      <div id="navbar-container"></div>

      <!-- Hero Section for Projects -->
      <section
        id="hero"
        class="flex items-center justify-center px-6 sm:px-6 md:px-8 pt-28 md:pt-24 pb-4 md:pb-4"
        style="min-height: 50vh"
      >
        <div class="flex flex-col items-center max-w-6xl">
          <h1
            class="text-4xl sm:text-5xl md:text-6xl font-bold mb-4 text-center"
          >
            My Projects
          </h1>
          <p
            class="text-base sm:text-lg md:text-xl text-gray-400 text-center max-w-2xl"
          >
            A complete showcase of projects I've built across various niches,
            highlighting adaptability, creativity, and real-world problem
            solving.
          </p>
        </div>
      </section>

      <!-- All Projects Section -->
      <section
        id="all-projects"
        class="pb-16 md:pb-24 px-6 sm:px-6 md:px-8 flex justify-center"
      >
        <div class="flex flex-col items-start w-full max-w-6xl">
          <!-- Search and Sort Controls -->
          <div
            class="w-full mb-8 sm:mb-12 flex flex-col sm:flex-row gap-4 sm:gap-6 items-start sm:items-center"
          >
            <!-- Search Input -->
            <div class="flex-1 w-full sm:w-auto">
              <input
                type="text"
                id="search-input"
                placeholder="Search projects..."
                class="w-full px-4 py-3 bg-black/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-white/40 focus:bg-white/15 transition"
              />
            </div>

            <!-- Sort Dropdown -->
            <select
              id="sort-dropdown"
              class="px-4 py-3 bg-black/10 border border-white/20 rounded-lg text-white focus:outline-none focus:border-white/40 focus:bg-white/20 transition cursor-pointer hover:bg-white/15"
            >
              <option value="">All Projects</option>
              <option value="graphic design">Graphic Design</option>
              <option value="video editing">Video Editing</option>
              <option value="osint">OSINT</option>
              <option value="web development">Web Development</option>
              <option value="desktop app development">
                Desktop App Development
              </option>
              <option value="uiux design">UI/UX Design</option>
            </select>
          </div>

          <!-- Projects Grid -->
          <div
            class="w-full grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8"
            id="projects-container"
          >
            <!-- All projects will be loaded here by JavaScript -->
          </div>
        </div>
      </section>

      <!-- Footer Container -->
      <div id="footer-container"></div>
    </div>

    <script src="./js/main.js"></script>
    <script src="./js/projects.js"></script>
    <script src="./js/services.js"></script>
    <script src="./js/animations.js"></script>
    <script src="./js/router.js"></script>
  </body>
</html>
